<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;
    background:#6366f1;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:18px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .title{font-size:1.1rem;font-weight:600;color:#fff;letter-spacing:-0.02em;}
  .sub{font-size:0.78rem;color:rgba(255,255,255,.6);margin-top:6px;}
</style></head><body>
  <div class="spinner"></div>
  <div class="title">AI 智能日历</div>
  <div class="sub">正在启动…</div>
</body></html>
